server {
    listen 80;
    server_name api.yourcompany.com;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Standard header forwarding so your Go logs show the real employee IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ==========================================
        # THE MANDATORY STREAMING OVERRIDES
        # ==========================================

        # 1. Stop NGINX from writing the CSV to the hard drive
        proxy_buffering off;
        proxy_request_buffering off;

        # 2. Give ClickHouse up to 5 minutes to calculate heavy reports
        proxy_read_timeout 300s;
        
        # 3. Stop NGINX from trying to re-compress your already-gzipped data
        gzip off; 
    }
}
